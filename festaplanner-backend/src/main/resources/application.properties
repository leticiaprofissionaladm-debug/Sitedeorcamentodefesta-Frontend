# =========================================================
# FESTA PLANNER - BACKEND (Spring Boot)
# =========================================================

spring.application.name=festaplanner-backend
server.port=8080

# ---- Banco de dados MySQL ----
# Crie o schema antes de subir a aplicacao: CREATE DATABASE festaplanner;
spring.datasource.url=jdbc:mysql://localhost:3306/festaplanner?useSSL=false&serverTimezone=America/Sao_Paulo&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# "update" cria/ajusta as tabelas automaticamente a partir das entidades.
# Troque para "validate" quando o schema estiver estavel/em producao.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---- Upload de imagens (catalogo) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# ---- JWT ----
# IMPORTANTE: gere uma chave forte e mova para variavel de ambiente em producao.
app.jwt.secret=CHANGE_THIS_SECRET_TO_A_LONG_RANDOM_STRING_BEFORE_DEPLOY_1234567890
app.jwt.expiration-ms=86400000

# ---- CORS (endereco do Angular em dev) ----
app.cors.allowed-origins=http://localhost:4200

# ---- Logging ----
logging.level.org.springframework.security=INFO
logging.level.com.festaplanner=DEBUG
